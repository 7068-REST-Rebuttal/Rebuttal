      <section id="long-time-stability" class="figure-section" aria-labelledby="long-time-stability-label">
        <figure class="figure-card">
          <div class="figure-meta">
            <div class="badge-row">

              <span class="badge">R-oTWk</span>

          </div>
          <img
            src="assets/figures/long-time-stability.png"
            alt="Figure showing FID, FVD, and Sync-C as functions of generation duration on HDTF, with min-max bands and relative-span annotations."
            loading="lazy"
          >
          <figcaption>
            <span class="caption-label">Figure R2.</span>
            Long-time generation stability analysis on the HDTF dataset.
            The evolution of major performance metrics (FID, FVD, and Sync-C) is evaluated across extended generation durations.
            Each panel illustrates a specific metric, annotated with <span class="math-inline">\(\downarrow\)</span> to indicate lower-is-better and <span class="math-inline">\(\uparrow\)</span> to indicate higher-is-better.
            The shaded bands denote the empirical minimum-to-maximum intervals, and the annotated percentages quantify the relative fluctuation span, calculated as the minimum-to-maximum difference divided by the mean.
            All experimental and testing procedures are kept strictly consistent with the original manuscript.
          </figcaption>
        </figure>
      </section>

      <section id="latency-breakdown" class="figure-section" aria-labelledby="latency-breakdown-label">
        <figure class="figure-card">
          <div class="figure-meta">
            <div class="badge-row">
              <span class="badge">R-oTWk</span>
              <span class="badge badge-muted">System Analysis</span>
            </div>
            <p id="latency-breakdown-label" class="section-label">Latency Breakdown</p>
          </div>
          <img
            src="assets/figures/latency-breakdown.png"
            alt="Table image reporting first-chunk and subsequent-chunk latency for VAE Encode, SpeechAE, A2V-DiT, VAE Decode, and end-to-end inference."
            loading="lazy"
          >
          <figcaption>
            <span class="caption-label">Table R2.</span>
            Detailed latency breakdown of the REST framework.
            All experimental parameters are maintained strictly consistent with the main manuscript.
            Inference is evaluated on a single A100 GPU via a chunk-by-chunk streaming paradigm, generating videos at a <span class="math-inline">\(512 \times 512\)</span> resolution with 8-step inference sampling and a <span class="math-inline">\(1\)</span>-second chunk duration.
            The rows delineate the computational overhead for the first chunk versus subsequent chunks during streaming inference.
            The columns decompose the time cost across individual modules: VAE Encode, SpeechAE (inclusive of the Whisper encoder), A2V-DiT, VAE Decode, and the overall end-to-end pipeline.
            <span class="math-inline">\((-)\)</span> indicates that reference image encoding is bypassed for subsequent chunks, facilitated by the ID-Sink mechanism.
          </figcaption>
        </figure>
      </section>

      <section id="whisper-streaming" class="figure-section" aria-labelledby="whisper-streaming-label">

          <div class="figure-meta">

              <span class="badge badge-muted">Streaming Front End</span>

            <p id="whisper-streaming-label" class="section-label">Streaming Audio Front-End / Backbone Comparison</p>
          </div>
          <img
            src="assets/figures/whisper-streaming.png"
            alt="Table image comparing Full-Whisper and Chunk-Whisper front ends under non-streaming or streaming backbones using FID, FVD, and Sync-C."
            loading="lazy"
          >
          <figcaption>
            <span class="caption-label">Table R4.</span>
            Quantitative comparison of Whisper-based audio frontends and backbone modes on the HDTF dataset.
            The Full-Whisper frontend denotes the frontend utilizing the complete global audio context, whereas Chunk-Whisper represents whisper embeddings extracted via a true chunk-by-chunk streaming paradigm, precluding history or future context.
            Streaming backbone corresponds to the proposed causal architecture, and Non-streaming indicates the parallel network variant composed of identical modules.
            The rows evaluate specific frontend-backbone configurations, with the columns detailing the corresponding FID (<span class="math-inline">\(\downarrow\)</span>), FVD (<span class="math-inline">\(\downarrow\)</span>), and Sync-C (<span class="math-inline">\(\uparrow\)</span>) metrics.
            All inference pipelines are maintained strictly identical to the main manuscript.
            The best performance per metric is highlighted in <span class="math-inline">\(\textbf{bold}\)</span>.
          </figcaption>
        </figure>
